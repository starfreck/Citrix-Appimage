name: Build and Release Citrix AppImage

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight
  push:
    branches: [ main ] # Trigger on every push to main
  workflow_dispatch: # Allow manual triggers

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to create releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libxml2-utils curl binutils
          # AppImageTool requirements
          sudo apt-get install -y libfuse2

      - name: Check latest version from RSS
        id: check_version
        run: |
          RSS_URL="https://www.citrix.com/content/citrix/en_us/downloads/workspace-app.rss"
          # Get latest version string from RSS
          LATEST_VERSION=$(curl -s "$RSS_URL" | grep -oP 'Citrix Workspace app \K[0-9.]+(?= for Linux)' | head -n 1)
          echo "Latest version: $LATEST_VERSION"
          echo "version=$LATEST_VERSION" >> $GITHUB_OUTPUT

      - name: Check if release already exists
        id: check_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.check_version.outputs.version }}"
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release $VERSION already exists. Skipping build."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Release $VERSION does not exist. Proceeding with build."
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build AppImage
        if: steps.check_release.outputs.exists == 'false'
        run: |
          chmod +x automate-citrix.sh pack-citrix-appimage.sh
          ./automate-citrix.sh

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check_version.outputs.version }}
          name: Citrix Workspace ${{ steps.check_version.outputs.version }}
          files: CitrixWorkspace-x86_64.AppImage
          body: |
            Automated build of Citrix Workspace AppImage for Linux.
            
            Version: ${{ steps.check_version.outputs.version }}
            Built on: $(date)
          draft: false
          prerelease: false
